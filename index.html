<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Control - Forest & Gold Edition</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Paytone+One&family=Playball&family=Poetsen+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Russo+One&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="bubble-container"></div>
    <div class="light-reflection"></div>
    
    <div class="container">
      <header class="header">
        <div class="header-left">
          <i class="fa-solid fa-tractor"></i>
          <h1>Smart Control</h1>
        </div>
        <div class="header-right">
          <span id="current-time">--</span>
          <button class="btn-icon"><i class="fas fa-cog"></i></button>
        </div>
      </header>

      <div class="sensor-grid">
        <div class="sensor-card temperature">
          <div class="card-header">
            <i class="fas fa-thermometer-half"></i>
            <h3>Suhu</h3>
          </div>
          <div class="card-value" id="suhu-value">--</div>
          <div class="card-gauge"></div>
        </div>

        <div class="sensor-card">
          <div class="card-header">
            <i class="fas fa-tint"></i>
            <h3>Kelembaban</h3>
          </div>
          <div class="card-value" id="kelembaban-value">--</div>
        </div>

        <div class="sensor-card">
          <div class="card-header">
            <i class="fas fa-calendar-alt"></i>
            <h3>Umur Ayam</h3>
          </div>
          <div class="card-value" id="umur-display">0 Hari</div>
        </div>

        <div class="sensor-card">
          <div class="card-header">
            <i class="fas fa-pen-alt"></i>
            <h3>Masukkan Umur Ayam</h3>
          </div>
          <div class="age-input-container">
            <input type="number" id="umur-input" placeholder="Hari" min="0" max="100" value="0">
            <button id="set-umur-btn">Set</button>
          </div>
          <div class="age-feedback" id="umur-feedback">Masukkan umur ayam dalam hari</div>
        </div>
      </div>
      
      <div class="control-panel">
        <div class="panel-header">
          <h2><i class="fas fa-robot"></i>CONTROL CENTER</h2>
          <div class="mode-toggle">
            <button class="btn-mode active">AUTO</button>
            <button class="btn-mode">MANUAL</button>
          </div>
        </div>
        <div class="controls-grid">
          <div class="control-item">
            <i class="fas fa-filter"></i>
            <h4>LAMPU</h4>
            <div class="control-status">NONAKTIF</div>
            <div class="toggle-container">
              <label class="toggle-switch">
                <input type="checkbox" disabled />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
          <div class="control-item">
            <i class="fas fa-fire"></i>
            <h4>POMPA</h4>
            <div class="control-status">NONAKTIF</div>
            <div class="toggle-container">
              <label class="toggle-switch">
                <input type="checkbox" disabled />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
          <div class="control-item">
            <i class="fas fa-wind"></i>
            <h4>KIPAS</h4>
            <div class="control-status">NONAKTIF</div>
            <div class="toggle-container">
              <label class="toggle-switch">
                <input type="checkbox" disabled />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
